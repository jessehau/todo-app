<h1> Tehtävät: </h1>

<form method="POST" action="/">

    {% csrf_token %}

    {{TaskForm.title}}

    <input class="btn" type="submit" name="Luo tehtävä:">

</form>


{% for task in tasks %}

    <p> {{task}} </p>

    {% if task.completed == True %}

        <p> Suoritettu </p>

        
    {% else %}

        <p>Tehtävää ei vielä suoritettu </p>

    {% endif %}

    <a href="{% url 'update-task' task.id %}"> Muuta </a>
    <br>
    <a href="{% url 'delete-task' task.id %}"> Poista </a>
    <hr>

{% endfor %}
